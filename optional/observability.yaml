apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/23120049/yas-helm.git
    targetRevision: vibebranch
    path: deploy/observability/opentelemetry
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/23120049/yas-helm.git
    targetRevision: vibebranch
    path: deploy/observability/grafana
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
