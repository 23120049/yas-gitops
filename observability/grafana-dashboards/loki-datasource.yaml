apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-grafana-datasource
  namespace: observability
  labels:
    grafana_datasource: "1"
    release: prometheus
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki-gateway.observability.svc.cluster.local
      access: proxy
      isDefault: false
      jsonData:
        httpMethod: GET
        timeout: 60s
