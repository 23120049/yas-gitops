apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: order-staging
  namespace: observability
  labels:
    app.kubernetes.io/instance: order-staging
    app.kubernetes.io/name: order
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: order-staging
      app.kubernetes.io/name: order
  namespaceSelector:
    matchNames:
      - staging
  podMetricsEndpoints:
    - port: metric
      path: /actuator/prometheus
      interval: 30s
      scheme: http
      honorLabels: true
