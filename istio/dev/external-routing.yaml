apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: yas-web-dev
  namespace: dev
spec:
  hosts:
    - dev-storefront.yas.local.com
    - dev-backoffice.yas.local.com
  gateways:
    - istio-system/yas-gateway
  http:
    - match:
        - authority:
            exact: dev-storefront.yas.local.com
      route:
        - destination:
            host: storefront-bff.dev.svc.cluster.local
            port:
              number: 80
    - match:
        - authority:
            exact: dev-backoffice.yas.local.com
      route:
        - destination:
            host: backoffice-bff.dev.svc.cluster.local
            port:
              number: 80
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: yas-api-dev
  namespace: dev
spec:
  hosts:
    - dev-api.yas.local.com
  gateways:
    - istio-system/yas-gateway
  http:
    - match:
        - uri:
            prefix: /swagger-ui
      route:
        - destination:
            host: swagger-ui.dev.svc.cluster.local
            port:
              number: 8080
    - match:
