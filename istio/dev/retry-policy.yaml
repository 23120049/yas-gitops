apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: tax-retry-policy
  namespace: yas-dev
spec:
  hosts:
    - "tax.yas-dev.svc.cluster.local"
  http:
    - route:
        - destination:
            host: "tax.yas-dev.svc.cluster.local"
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: gateway-error,connect-failure,refused-stream,5xx
