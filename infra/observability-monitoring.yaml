apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/23120049/yas-gitops.git
    targetRevision: main
    path: observability/grafana-dashboards
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
