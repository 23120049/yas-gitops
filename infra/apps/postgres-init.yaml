apiVersion: v1
kind: Namespace
metadata:
  name: infra
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
  namespace: infra
  annotations:
    argocd.argoproj.io/sync-wave: "1"
data:
  init-databases.sh: |
    #!/bin/bash
    set -e

    DATABASES=(
      "cart_dev" "cart_staging"
      "customer_dev" "customer_staging"
      "inventory_dev" "inventory_staging"
      "keycloak_dev" "keycloak_staging"
      "location_dev" "location_staging"
      "media_dev" "media_staging"
      "order_dev" "order_staging"
      "payment_dev" "payment_staging"
      "payment_paypal_dev" "payment_paypal_staging"
      "product_dev" "product_staging"
      "promotion_dev" "promotion_staging"
      "rating_dev" "rating_staging"
      "tax_dev" "tax_staging"
      "recommendation_dev" "recommendation_staging"
      "webhook_dev" "webhook_staging"
      "search_dev" "search_staging"
      "sampledata_dev" "sampledata_staging"
    )

    export PGPASSWORD="$POSTGRES_PASSWORD"

    echo "Waiting for PostgreSQL service to be ready..."
    until pg_isready -h "$POSTGRES_HOST" -p 5432 -U "$POSTGRES_USER"; do
      sleep 2
    done

    echo "Starting database initialization..."
    for db in "${DATABASES[@]}"; do
      EXISTS=$(psql -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='$db'")
      if [ "$EXISTS" != "1" ]; then
        echo "Creating database: $db"
        psql -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d postgres -c "CREATE DATABASE \"$db\" WITH OWNER \"$POSTGRES_USER\";"
      else
        echo "Database $db already exists."
      fi
    done
    echo "All databases initialized successfully!"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-init-job
  namespace: infra
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  template:
    spec:
      containers:
        - name: init-db
          image: postgres:15-alpine
          command: ["/bin/bash", "/scripts/init-databases.sh"]
          env:
            - name: POSTGRES_HOST
              value: "postgresql"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: yasadminuser.postgresql.credentials.postgresql.acid.zalan.do
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yasadminuser.postgresql.credentials.postgresql.acid.zalan.do
                  key: password
          volumeMounts:
            - name: script-vol
              mountPath: /scripts
      restartPolicy: OnFailure
      volumes:
        - name: script-vol
          configMap:
            name: postgres-init-script
