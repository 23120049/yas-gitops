apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pgadmin
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://github.com/23120049/yas-helm.git'
      targetRevision: vibebranch
      path: deploy/postgres/pgadmin
      helm:
        valueFiles:
          - $values/values/infra/pgadmin.yaml
    - repoURL: 'https://github.com/23120049/yas-gitops.git'
      targetRevision: vibebranch
      ref: values
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
