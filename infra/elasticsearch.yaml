apiVersion: argoproj.io/v1alpha1

kind: Application

metadata:

  name: elasticsearch

  namespace: argocd

spec:

  project: default

  sources:

    - repoURL: 'https://github.com/23120049/yas-helm.git'

      targetRevision: main

      path: deploy/elasticsearch/elasticsearch-cluster

      helm:

        valueFiles:

          - $values/values/infra/elastic.yaml

    - repoURL: 'https://github.com/23120049/yas-gitops.git'

      targetRevision: main

      ref: values

  destination:

    server: 'https://kubernetes.default.svc'

    namespace: infra

  syncPolicy:

    automated:

      prune: true

      selfHeal: true

    syncOptions:
      - CreateNamespace=true

