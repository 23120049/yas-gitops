apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elasticsearch
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://github.com/23120049/yas-helm.git'
      targetRevision: HEAD
      path: deploy/elasticsearch/elasticsearch-cluster
      helm:
        valueFiles:
          - $values/values/infra/elastic.yaml
    - repoURL: 'https://github.com/23120049/yas-gitops.git'
      targetRevision: HEAD
      ref: values
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: elasticsearch
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true
