apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: opentelemetry-collector
  namespace: observability
spec:
  mode: deployment
  image: otel/opentelemetry-collector-contrib:0.120.0
  ports:
    - name: loki
      port: 3500
      targetPort: 3500
      protocol: TCP
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

  config:
    receivers:
      loki:
        protocols:
          http:
            endpoint: 0.0.0.0:3500
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch: {}

    exporters:
      loki:
        endpoint: http://loki-gateway.observability.svc.cluster.local/loki/api/v1/push
      otlphttp/tempo:
        endpoint: http://tempo.observability.svc.cluster.local:4318

    service:
      pipelines:
        logs:
          receivers: [loki]
          processors: [batch]
          exporters: [loki]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp/tempo]
