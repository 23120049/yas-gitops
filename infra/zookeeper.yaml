apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zookeeper
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/23120049/yas-helm.git
      targetRevision: vibebranch
      path: deploy/zookeeper
      helm:
        valueFiles:
          - $values/values/infra/zookeeper.yaml
    - repoURL: https://github.com/23120049/yas-gitops.git
      targetRevision: vibebranch
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
