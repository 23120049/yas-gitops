apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-configuration-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/23120049/yas-helm.git'
    targetRevision: main
    path: charts/yas-configuration
    helm:
      values: |
        applicationConfig:
          springdoc:
            oauthflow:
              authorization-url: http://identity.yas.local.com/realms/Yas/protocol/openid-connect/auth
              token-url: http://identity.yas.local.com/realms/Yas/protocol/openid-connect/token
        mediaApplicationConfig:
          yas:
            publicUrl: http://staging-api.yas.local.com/media
        paymentPaypalApplicationConfig:
          yas:
            public:
              url: http://staging-storefront.yas.local.com/complete-payment
        sampledataApplicationConfig:
          spring:
            datasource:
              product:
                url: jdbc:postgresql://postgresql.infra:5432/product_staging
              media:
                url: jdbc:postgresql://postgresql.infra:5432/media_staging
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
