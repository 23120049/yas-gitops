apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backoffice-bff-dev
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://github.com/23120049/yas-helm.git'
      targetRevision: main
      path: charts/backoffice-bff
      helm:
        valueFiles:
          - $values/values/dev/dynamic-tags/backoffice-bff.yaml
        values: |
          backend:
            ingress:
              enabled: false
              host: dev-backoffice.yas.100-108-98-79.sslip.io
    - repoURL: 'https://github.com/23120049/yas-gitops.git'
      targetRevision: main
      ref: values
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
