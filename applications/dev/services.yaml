apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: swagger-ui-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/23120049/yas-helm.git'
    targetRevision: main
    path: charts/swagger-ui
    helm:
      values: |
        urls: "[{ url: 'http://dev-api.yas.100-108-98-79.sslip.io/product/v3/api-docs', name: 'Product' }, { url: 'http://dev-api.yas.100-108-98-79.sslip.io/media/v3/api-docs', name: 'Media' }, { url: 'http://dev-api.yas.100-108-98-79.sslip.io/customer/v3/api-docs', name: 'Customer' }, { url: 'http://dev-api.yas.100-108-98-79.sslip.io/cart/v3/api-docs', name: 'Cart' }, { url: 'http://dev-api.yas.100-108-98-79.sslip.io/rating/v3/api-docs', name: 'Rating' }, { url: 'http://dev-api.yas.100-108-98-79.sslip.io/order/v3/api-docs', name: 'Order' }, { url: 'http://dev-api.yas.100-108-98-79.sslip.io/payment/v3/api-docs', name: 'Payment' }, { url: 'http://dev-api.yas.100-108-98-79.sslip.io/location/v3/api-docs', name: 'Location' }, { url: 'http://dev-api.yas.100-108-98-79.sslip.io/inventory/v3/api-docs', name: 'Inventory' }, { url: 'http://dev-api.yas.100-108-98-79.sslip.io/tax/v3/api-docs', name: 'Tax' }, { url: 'http://dev-api.yas.100-108-98-79.sslip.io/promotion/v3/api-docs', name: 'Promotion' }, { url: 'http://dev-api.yas.100-108-98-79.sslip.io/search/v3/api-docs', name: 'Search' }]"
        ingress:
          enabled: false
          host: dev-api.yas.100-108-98-79.sslip.io
          hosts:
            - host: dev-api.yas.100-108-98-79.sslip.io
              paths:
                - path: /swagger-ui
                  pathType: ImplementationSpecific
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
