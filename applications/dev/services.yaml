apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-configuration-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/23120049/yas-helm.git'
    targetRevision: HEAD
    path: charts/yas-configuration
    helm:
      values: |
        applicationConfig:
          springdoc:
            oauthflow:
              authorization-url: http://identity.yas.local.com/realms/Yas/protocol/openid-connect/auth
              token-url: http://identity.yas.local.com/realms/Yas/protocol/openid-connect/token
        mediaApplicationConfig:
          yas:
            publicUrl: http://dev-api.yas.local.com/media
        paymentPaypalApplicationConfig:
          yas:
            public:
              url: http://dev-storefront.yas.local.com/complete-payment
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: yas-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true
---
