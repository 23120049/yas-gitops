backend:
  image:
    repository: ghcr.io/23120049/yas-cart
    tag: 7520242b
  serviceMonitor:
    enabled: true
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: metric
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: metric

cartApplicationConfig:
  management:
    otlp:
      tracing:
        endpoint: http://opentelemetry-collector-collector.observability.svc.cluster.local:4318/v1/traces
      metrics:
        url: http://opentelemetry-collector-collector.observability.svc.cluster.local:4318/v1/metrics
    server:
      port: 8090
    health:
      readinessstate:
        enabled: true
      livenessstate:
        enabled: true
    tracing:
      sampling:
        probability: 1.0
    metrics:
      tags:
        application: ${spring.application.name}
    endpoints:
      web:
        exposure:
          include: prometheus, health
    endpoint:
      health:
        probes:
          enabled: true
        show-details: always
