backend:
  image:
    repository: ghcr.io/23120049/yas-order
    tag: latest
  serviceMonitor:
    enabled: true
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: metric
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: metric
orderApplicationConfig:
  management:
    tracing:
      sampling:
        probability: 1.0
    metrics:
      export:
        otlp:
          enabled: false
    server:
      port: 8090
    health:
      readinessstate:
        enabled: true
      livenessstate:
        enabled: true
    metrics:
      tags:
        application: ${spring.application.name}
    endpoints:
      web:
        exposure:
          include: prometheus, health
    endpoint:
      health:
        probes:
          enabled: true
        show-details: always
  otel:
    service:
      name: order
    sdk:
      autoconfigure:
        enabled: true
    exporter:
      otlp:
        endpoint: http://opentelemetry-collector-collector.observability.svc.cluster.local:4317
        protocol: grpc
    traces:
      exporter: otlp
    metrics:
      exporter: none
  logging:
    pattern:
      level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
