hostname: &hostname grafana.yas.local.com

prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true

grafana:
  env:
    GF_DATABASE_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: grafana-db-secret
          key: password

  grafana.ini:
    database:
      type: postgres
      host: postgresql.postgres:5432
      name: grafana
      user: yasadminuser
      password: $__env{GF_DATABASE_PASSWORD}
      ssl_mode: require

  adminUser: admin
  adminPassword: admin

  ingress:
    ingressClassName: nginx
    enabled: true
    hosts:
      - *hostname