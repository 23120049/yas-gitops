hostname: &hostname grafana.yas.local.com

prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true

grafana:
  adminUser: admin
  adminPassword: admin

  grafana.ini:
    database:
      type: sqlite3
      path: grafana.db
      
  ingress:
    ingressClassName: nginx
    enabled: true
    hosts:
      - *hostname
