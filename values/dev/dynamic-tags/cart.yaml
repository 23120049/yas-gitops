backend:
  image:
    repository: ghcr.io/23120049/yas-cart
    tag: 44e0b6ce79fae773a1b8f2fc385af0406a912c38
  serviceMonitor:
    enabled: true
  podAnnotations:
    sidecar.istio.io/inject: "true"
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: metric
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: metric
cartApplicationConfig:
  management:
    otlp:
      tracing:
        endpoint: http://10.43.1.133:4318/v1/traces
      metrics:
        url: http://10.43.1.133:4318/v1/metrics
    server:
      port: 8090
    health:
      readinessstate:
        enabled: true
      livenessstate:
        enabled: true
    tracing:
      sampling:
        probability: 1.0
    metrics:
      tags:
        application: ${spring.application.name}
    endpoints:
      web:
        exposure:
          include: prometheus, health
    endpoint:
      health:
        probes:
          enabled: true
        show-details: always
  otel:
    sdk:
      autoconfigure:
        enabled: true
    exporter:
      otlp:
        endpoint: http://10.43.1.133:4318
    traces:
      exporter: otlp
    metrics:
      exporter: none
    service:
      name: cart
