backend:
  image:
    repository: ghcr.io/23120049/yas-cart
    tag: 2aea1e4950fa4a3bae658a5b1b548470ed277a67
  serviceMonitor:
    enabled: true
  podAnnotations:
    sidecar.istio.io/inject: "true"
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: metric
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: metric
cartApplicationConfig:
  management:
    tracing:
      sampling:
        probability: 1.0
    metrics:
      export:
        otlp:
          enabled: false
    server:
      port: 8090
    health:
      readinessstate:
        enabled: true
      livenessstate:
        enabled: true
    metrics:
      tags:
        application: ${spring.application.name}
    endpoints:
      web:
        exposure:
          include: prometheus, health
    endpoint:
      health:
        probes:
          enabled: true
        show-details: always
  otel:
    service:
      name: cart
    sdk:
      autoconfigure:
        enabled: true
    exporter:
      otlp:
        endpoint: http://opentelemetry-collector-collector.observability.svc.cluster.local:4317
        protocol: grpc
    traces:
      exporter: otlp
    metrics:
      exporter: none
