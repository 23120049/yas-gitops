apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-bootstrap-connectors
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/23120049/yas-gitops.git
    targetRevision: main
    path: infra
    directory:
      include: debezium-connectors.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
