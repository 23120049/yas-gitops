apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-bootstrap-workloads
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/23120049/yas-gitops.git
    targetRevision: vibebranch
    path: applications
    directory:
      recurse: true
      include: '{dev/services.yaml,staging/services.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
