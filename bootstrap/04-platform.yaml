apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-bootstrap-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/23120049/yas-gitops.git
    targetRevision: vibebranch
    path: infra
    directory:
      include: '{kafka.yaml,keycloak.yaml,pgadmin.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
