apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-bootstrap-operators
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/23120049/yas-gitops.git
    targetRevision: vibebranch
    path: infra/operators
    directory:
      include: '{postgres-operator.yaml,strimzi-operator.yaml,eck-operator.yaml,keycloak-operator.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
