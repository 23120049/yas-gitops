apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-bootstrap-core-infrastructure
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/23120049/yas-gitops.git
    targetRevision: vibebranch
    path: infra/core
    directory:
      include: '{postgresql.yaml,redis.yaml,elasticsearch.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
