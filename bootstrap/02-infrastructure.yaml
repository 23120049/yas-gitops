apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-bootstrap-infrastructure
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/23120049/yas-gitops.git
    targetRevision: main
    path: infra
    directory:
      include: '{postgresql.yaml,redis.yaml,kafka.yaml,elasticsearch.yaml,keycloak.yaml,pgadmin.yaml,zookeeper.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
