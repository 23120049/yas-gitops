apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-bootstrap-routing
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/23120049/yas-gitops.git
    targetRevision: main
    path: istio
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
