apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-root-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/23120049/yas-gitops.git'
    targetRevision: HEAD
    path: infra
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-root-apps-dev
  namespace: argocd
